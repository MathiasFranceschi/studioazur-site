<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <title>Page introuvable — Studio Azur</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --noir: #0a0f1a;
            --deep: #0f1520;
            --slate: #1a2235;
            --linen: #ede8df;
            --cream: #f8f5f0;
            --terre: #c2693d;
            --terre-light: #d88a60;
            --azur: #2980b9;
            --or: #c9a84c;
            --white: #f0ece4;
            --serif: 'Cormorant Garamond', 'Georgia', serif;
            --sans: 'Inter', system-ui, sans-serif;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--sans);
            background: var(--deep);
            color: var(--linen);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 600px;
        }
        .code {
            font-family: var(--serif);
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 300;
            line-height: 1;
            color: var(--terre);
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
        }
        .divider {
            width: 60px;
            height: 2px;
            background: var(--or);
            margin: 0 auto 2rem;
        }
        h1 {
            font-family: var(--serif);
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 400;
            color: var(--white);
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
        }
        p {
            font-size: 1rem;
            font-weight: 300;
            color: rgba(237, 232, 223, 0.7);
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }
        .cta {
            display: inline-block;
            padding: 0.875rem 2.5rem;
            background: var(--terre);
            color: var(--white);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: background 0.25s ease, transform 0.2s ease;
            border-radius: 2px;
        }
        .cta:hover {
            background: var(--terre-light);
            transform: translateY(-1px);
        }
        .brand {
            margin-top: 4rem;
            font-family: var(--serif);
            font-size: 0.9rem;
            font-weight: 300;
            color: rgba(237, 232, 223, 0.35);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <div class="divider"></div>
        <h1>Page introuvable</h1>
        <p>La page que vous cherchez n'existe pas ou a été déplacée.<br>Retournez à l'accueil pour continuer.</p>
        <a href="/" class="cta">Retour à l'accueil</a>
        <div class="brand">Studio Azur</div>
    </div>
</body>
</html>
